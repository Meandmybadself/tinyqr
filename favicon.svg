    <rect x="16" y="2" width="2" height="2"/>
    <rect x="13" y="5" width="2" height="2"/>
    <rect x="18" y="5" width="2" height="2"/>
    <rect x="13" y="13" width="2" height="2"/>
    <rect x="16" y="13" width="2" height="2"/>
    <rect x="19" y="13" width="2" height="2"/>
    <rect x="13" y="16" width="2" height="2"/>
    <rect x="17" y="16" width="2" height="2"/>
    <rect x="21" y="16" width="2" height="2"/>
    <rect x="13" y="19" width="2" height="2"/>
    <rect x="15" y="19" width="2" height="2"/>
    <rect x="19" y="19" width="2" height="2"/>
    <rect x="23" y="19" width="2" height="2"/>
    <rect x="13" y="22" width="2" height="2"/>
    <rect x="16" y="22" width="2" height="2"/>
    <rect x="20" y="22" width="2" height="2"/>
    <rect x="24" y="22" width="2" height="2"/>
    <rect x="13" y="25" width="2" height="2"/>
    <rect x="17" y="25" width="2" height="2"/>
    <rect x="21" y="25" width="2" height="2"/>
    <rect x="2" y="13" width="2" height="2"/>
    <rect x="5" y="13" width="2" height="2"/>
    <rect x="8" y="13" width="2" height="2"/>
    <rect x="2" y="16" width="2" height="2"/>
    <rect x="6" y="16" width="2" height="2"/>
    <rect x="9" y="16" width="2" height="2"/>
    <rect x="2" y="19" width="2" height="2"/>
    <rect x="5" y="19" width="2" height="2"/>
    <rect x="8" y="19" width="2" height="2"/>
    <rect x="24" y="13" width="2" height="2"/>
    <rect x="27" y="13" width="2" height="2"/>
    <rect x="24" y="16" width="2" height="2"/>
    <rect x="28" y="16" width="2" height="2"/>
    <rect x="24" y="24" width="2" height="2"/>
    <rect x="27" y="27" width="2" height="2"/>
