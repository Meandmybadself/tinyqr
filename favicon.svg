<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>TinyQR</title>
  <rect width="32" height="32" fill="#ffffff"/>
  <g fill="#0f1419">
    <!-- Top-left finder -->
